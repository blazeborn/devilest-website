<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Showcase</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            margin: 0;
            padding: 2rem;
        }

        .carousel-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .carousel-wrapper {
            overflow: hidden;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease;
        }

        .carousel-slide {
            min-width: 100%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            min-height: 600px;
        }

        .slide-content {
            padding: 3rem;
            background: rgba(0, 0, 0, 0.6);
        }

        .slide-sidebar {
            padding: 2rem;
            background: rgba(220, 38, 38, 0.05);
            border-left: 1px solid rgba(220, 38, 38, 0.2);
        }

        .project-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(220, 38, 38, 0.3);
            padding-bottom: 1rem;
        }

        .project-title {
            font-size: 2.8rem;
            color: #f9fafb;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .project-genre {
            background: rgba(220, 38, 38, 0.2);
            color: #dc2626;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 1rem;
        }

        .project-status {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .project-status.published { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .project-status.prototype { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .project-status.academic { background: rgba(168, 85, 247, 0.2); color: #a855f7; }

        .project-description {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #d1d5db;
        }

        .project-features h4 {
            color: #dc2626;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .project-features ul {
            list-style: none;
        }

        .project-features li {
            padding: 0.7rem 0;
            color: #d1d5db;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .project-features li:last-child {
            border-bottom: none;
        }

        .project-features strong {
            color: #dc2626;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .info-card h4 {
            color: #dc2626;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(220, 38, 38, 0.3);
            padding-bottom: 0.5rem;
        }

        .info-section {
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-section:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-section h5 {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .info-section p {
            color: #f3f4f6;
            margin: 0;
            font-weight: 500;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.8rem;
        }

        .tech-tag {
            background: rgba(220, 38, 38, 0.2);
            color: #f3f4f6;
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(220, 38, 38, 0.3);
            text-align: center;
        }

        /* Navigation */
        .carousel-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .carousel-arrow {
            background: rgba(220, 38, 38, 0.2);
            color: #dc2626;
            border: 1px solid rgba(220, 38, 38, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-arrow:hover {
            background: rgba(220, 38, 38, 0.4);
            transform: translateY(-2px);
        }

        .carousel-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .carousel-dots {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .carousel-dot {
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .carousel-dot:hover {
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
            border-color: rgba(220, 38, 38, 0.3);
        }

        .carousel-dot.active {
            background: #dc2626;
            color: #fff;
            border-color: #dc2626;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .carousel-slide {
                grid-template-columns: 1fr;
            }
            
            .slide-sidebar {
                border-left: none;
                border-top: 1px solid rgba(220, 38, 38, 0.2);
            }
        }

        @media (max-width: 768px) {
            .slide-content {
                padding: 2rem;
            }
            
            .project-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <!-- Navigation -->
        <div class="carousel-nav">
            <button class="carousel-arrow prev" onclick="previousSlide()">‹</button>
            <div class="carousel-dots">
                <!-- Dots will be generated dynamically from JSON -->
            </div>
            <button class="carousel-arrow next" onclick="nextSlide()">›</button>
        </div>

        <div class="carousel-wrapper">
            <div class="carousel-slides">
                <!-- Slides will be generated dynamically from JSON -->
            </div>
        </div>
    </div>

    <script>
    let currentSlide = 0;
    let projects = [];

    async function loadProjectData() {
        try {
            const response = await fetch('projects/projects.json');
            const projectData = await response.json();
            projects = [projectData];
            generateCarousel();
            updateCarousel();
        } catch (error) {
            console.error('Error loading project data:', error);
            loadFallbackData();
        }
    }

    function generateCarousel() {
        const slidesContainer = document.querySelector('.carousel-slides');
        const dotsContainer = document.querySelector('.carousel-dots');
        
        slidesContainer.innerHTML = '';
        dotsContainer.innerHTML = '';

        projects.forEach((project, index) => {
            const slide = createSlide(project);
            slidesContainer.appendChild(slide);
            const dot = createDot(project, index);
            dotsContainer.appendChild(dot);
        });
    }

    function createSlide(project) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `
            <div class="slide-content">
                <div class="project-header">
                    <h3 class="project-title">${project.title}</h3>
                    <span class="project-genre">${project.genre}</span>
                    <span class="project-status">${project.status}</span>
                </div>
                <div class="project-description">
                    <p>${project.description}</p>
                </div>
                <div class="project-features">
                    <h4>Key Features</h4>
                    <ul>
                        ${project.features.map(feature => `<li><strong>${feature.title}:</strong> ${feature.desc}</li>`).join('')}
                    </ul>
                </div>
            </div>
            <div class="slide-sidebar">
                <div class="info-card">
                    <h4>Project Info</h4>
                    ${Object.entries(project.info).map(([key, value]) => `
                        <div class="info-section">
                            <h5>${key.charAt(0).toUpperCase() + key.slice(1)}</h5>
                            <p>${value}</p>
                        </div>
                    `).join('')}
                </div>
                ${project.tech ? `
                    <div class="info-card">
                        <h4>Technology</h4>
                        <div class="tech-grid">
                            ${project.tech.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
        return slide;
    }

    function createDot(project, index) {
        const dot = document.createElement('button');
        dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
        dot.textContent = project.title;
        dot.onclick = () => goToSlide(index);
        return dot;
    }

    function updateCarousel() {
        const slideContainer = document.querySelector('.carousel-slides');
        const dots = document.querySelectorAll('.carousel-dot');
        const prevBtn = document.querySelector('.carousel-arrow.prev');
        const nextBtn = document.querySelector('.carousel-arrow.next');

        if (!slideContainer) return;

        slideContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentSlide);
        });
        if (prevBtn) prevBtn.disabled = currentSlide === 0;
        if (nextBtn) nextBtn.disabled = currentSlide === projects.length - 1;
    }

    function nextSlide() {
        if (currentSlide < projects.length - 1) {
            currentSlide++;
            updateCarousel();
        }
    }

    function previousSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            updateCarousel();
        }
    }

    function goToSlide(index) {
        currentSlide = index;
        updateCarousel();
    }

    function loadFallbackData() {
        projects = [{
            title: "Underworld",
            genre: "Action RPG",
            status: "In Development",
            description: "Experience the journey of an undead king awakening in the seventh circle of hell.",
            features: [
                {title: "Fast-paced Combat", desc: "Devil May Cry inspired mechanics"},
                {title: "Spiritual Narrative", desc: "Deep exploration of classical themes"}
            ],
            info: {
                platform: "PC (Windows)",
                engine: "Unreal Engine 5",
                status: "Active Development"
            },
            tech: ["UE5", "Ability System", "MVVM"]
        }];
        generateCarousel();
        updateCarousel();
    }

    document.addEventListener('DOMContentLoaded', loadProjectData);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') previousSlide();
        if (e.key === 'ArrowRight') nextSlide();
    });
    </script>
</body>
</html>
